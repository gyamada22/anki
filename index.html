<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFlash</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #18181c;
  --surface2: #222228;
  --border: #2e2e38;
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --green: #34d399;
  --red: #f87171;
  --text: #e8e8f0;
  --muted: #7070a0;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
.wrap { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
.logo { font-family: var(--mono); font-size: 18px; color: var(--accent2); }
.logo span { color: var(--muted); }

nav { display: flex; gap: 2px; background: var(--surface); border-radius: 10px; padding: 4px; margin-bottom: 2rem; }
nav button { flex: 1; padding: 9px; font-family: var(--sans); font-size: 13px; font-weight: 500; background: transparent; border: none; color: var(--muted); border-radius: 7px; cursor: pointer; transition: all 0.15s; }
nav button:hover { color: var(--text); }
nav button.active { background: var(--surface2); color: var(--text); }

.screen { display: none; }
.screen.active { display: block; }

.deck-info { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.pill { background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--muted); }
.pill.wrong-pill { border-color: #7f1d1d; color: var(--red); }
.cat-sel { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 6px 10px; border-radius: 8px; cursor: pointer; }

.prog-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
.prog-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
.prog-label { font-size: 12px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }

/* ── CLASSIC FRONT ────────────────────────── */
.card-front-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 2.5rem 2rem 2rem; display: flex; flex-direction: column; align-items: center; margin-bottom: 1rem;
}
.card-cat { font-size: 11px; font-weight: 500; color: var(--accent); font-family: var(--mono); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
.card-term { font-family: var(--mono); font-size: 26px; font-weight: 600; color: var(--text); margin-bottom: 2rem; text-align: center; line-height: 1.4; }
.user-answer-label { font-size: 12px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; align-self: flex-start; width: 100%; }
.user-answer-box { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-family: var(--sans); font-size: 14px; color: var(--text); resize: vertical; min-height: 80px; outline: none; transition: border-color 0.15s; line-height: 1.6; }
.user-answer-box:focus { border-color: var(--accent); }

/* ── CLASSIC BACK ─────────────────────────── */
.card-back-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1rem; display: none; }
.card-back-box.visible { display: block; }
.back-section-label { font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.back-user-answer { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; white-space: pre-wrap; word-break: break-word; font-style: italic; }
.divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
.back-term { font-family: var(--mono); font-size: 15px; color: var(--accent2); margin-bottom: 8px; }
.back-def { font-size: 15px; color: var(--text); line-height: 1.7; margin-bottom: 1rem; }
.back-example { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-family: var(--mono); font-size: 13px; color: var(--accent2); white-space: pre-wrap; word-break: break-all; line-height: 1.8; }

/* ── STRUCTURED FRONT ─────────────────────── */
.card-front-box.structured { align-items: stretch; padding: 1.75rem; }
.struct-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
.struct-title { font-family: var(--mono); font-size: 30px; font-weight: 600; color: var(--text); text-align: center; }
.struct-fields { display: flex; flex-direction: column; gap: 0.85rem; }
.struct-field { display: flex; flex-direction: column; gap: 6px; }
.struct-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
.struct-label-num { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); font-size: 9px; color: var(--accent2); flex-shrink: 0; }
.struct-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; width: 100%; }
.struct-input:focus { border-color: var(--accent); }
.struct-context { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: var(--mono); font-size: 12px; color: var(--accent2); margin-bottom: 4px; }

/* ── STRUCTURED BACK ──────────────────────── */
.struct-back-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 1rem; display: none; }
.struct-back-box.visible { display: block; }
.struct-back-row { padding: 1rem 1.5rem; }
.struct-back-row + .struct-back-row { border-top: 1px solid var(--border); }
.struct-back-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.struct-back-user { background: var(--surface2); border-radius: 6px; padding: 7px 10px; font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 6px; white-space: pre-wrap; word-break: break-word; }
.struct-back-correct { padding: 7px 10px 7px 14px; font-size: 13px; color: var(--green); border-left: 2px solid var(--green); line-height: 1.5; }
.struct-back-correct-code { background: var(--surface2); border-radius: 8px; border-left: 2px solid var(--green); padding: 10px 14px; font-family: var(--mono); font-size: 13px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; line-height: 1.6; }
.struct-code { color: var(--accent2); }
.struct-arrow { color: var(--muted); }
.struct-output { color: var(--green); }
.struct-context-back { background: var(--surface2); border-radius: 6px; padding: 6px 10px; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 6px; }

/* ── BUTTONS ──────────────────────────────── */
.btn-reveal { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; margin-bottom: 8px; }
.btn-reveal:hover { background: var(--accent2); }
.answer-btns { display: flex; gap: 10px; }
.btn-wrong { flex: 1; padding: 13px; background: transparent; border: 1px solid #7f1d1d; color: var(--red); border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-wrong:hover { background: #2b0d0d; }
.btn-right { flex: 1; padding: 13px; background: transparent; border: 1px solid #065f46; color: var(--green); border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-right:hover { background: #0d2b22; }
.btn-skip { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 18px; border-radius: 10px; font-family: var(--sans); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.btn-skip:hover { color: var(--text); border-color: var(--muted); }
.row-between { display: flex; justify-content: space-between; align-items: center; gap: 8px; }

/* ── SCORE ────────────────────────────────── */
.score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 3rem 2rem; text-align: center; }
.score-big { font-family: var(--mono); font-size: 64px; font-weight: 600; color: var(--accent2); line-height: 1; }
.score-label { font-size: 14px; color: var(--muted); margin-top: 8px; margin-bottom: 2rem; }
.score-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 2rem; }
.score-stat { background: var(--surface2); border-radius: 10px; padding: 12px 24px; text-align: center; }
.score-stat .n { font-family: var(--mono); font-size: 24px; font-weight: 600; }
.score-stat .l { font-size: 12px; color: var(--muted); margin-top: 2px; }
.score-stat.g .n { color: var(--green); }
.score-stat.r .n { color: var(--red); }
.btn-primary { padding: 12px 28px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.btn-primary:hover { background: var(--accent2); }

/* ── LIST ─────────────────────────────────── */
.list-head { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
.spacer { flex: 1; }
.card-list { display: flex; flex-direction: column; gap: 8px; }
.card-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 10px; transition: border-color 0.15s; }
.card-row:hover { border-color: var(--accent); }
.cr-type { font-size: 9px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; padding-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; min-width: 48px; }
.cr-term { font-family: var(--mono); font-size: 13px; color: var(--accent2); min-width: 110px; flex-shrink: 0; padding-top: 2px; }
.cr-def { font-size: 13px; color: var(--muted); line-height: 1.5; flex: 1; }
.cr-cat { font-size: 11px; color: var(--accent); font-family: var(--mono); flex-shrink: 0; padding-top: 3px; }
.cr-edit { background: transparent; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 0 4px; flex-shrink: 0; transition: color 0.12s; }
.cr-edit:hover { color: var(--accent2); }
.cr-del { background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0; line-height: 1; transition: color 0.12s; }
.cr-del:hover { color: var(--red); }

/* ── ADD FORM ─────────────────────────────── */
.form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
.form-section-title { font-size: 11px; color: var(--accent); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.type-toggle { display: flex; gap: 6px; margin-bottom: 1.5rem; }
.type-btn { flex: 1; padding: 10px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 11px; color: var(--muted); cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.5; }
.type-btn.active { background: rgba(124,106,247,0.1); border-color: var(--accent); color: var(--accent2); }
.field { margin-bottom: 1.25rem; }
.field label { display: block; font-size: 12px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.field input, .field textarea, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; }
.field select { cursor: pointer; }
.save-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.save-btn:hover { background: var(--accent2); }

/* ── MODAL ────────────────────────────────── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; overflow-y: auto; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1.25rem; color: var(--text); }
.modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
.modal-actions button { flex: 1; padding: 11px; border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; }
.modal-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.modal-save { background: var(--accent); border: none; color: #fff; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--green); color: var(--green); font-size: 14px; padding: 12px 20px; border-radius: 10px; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; font-family: var(--mono); z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }
.empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 15px; }
.empty-state b { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">dev<span>/</span>flash</div>
    <div style="font-size:12px;color:var(--muted);font-family:var(--mono)" id="total-badge"></div>
  </header>
  <nav>
    <button class="active" onclick="go('study')">Estudar</button>
    <button onclick="go('list')">Cards</button>
    <button onclick="go('add')">+ Adicionar</button>
  </nav>

  <!-- STUDY -->
  <div id="screen-study" class="screen active">
    <div class="deck-info">
      <select class="cat-sel" id="study-cat-sel" onchange="setupStudy()"></select>
      <span id="deck-count" class="pill">0 cards</span>
      <span id="wrong-count" class="pill wrong-pill" style="display:none"></span>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="prog-label" id="prog-label">0/0</span>
    </div>
    <div id="study-main"></div>
  </div>

  <!-- LIST -->
  <div id="screen-list" class="screen">
    <div class="list-head">
      <select class="cat-sel" id="list-cat-sel" onchange="renderList()"></select>
      <div class="spacer"></div>
      <span id="list-count" style="font-size:12px;color:var(--muted);font-family:var(--mono)"></span>
    </div>
    <div class="card-list" id="card-list"></div>
  </div>

  <!-- ADD -->
  <div id="screen-add" class="screen">
    <div class="form-card">
      <div class="form-section-title">Tipo de card</div>
      <div class="type-toggle">
        <div class="type-btn active" id="toggle-classic" onclick="setFormType('classic')">Classic<br><span style="font-size:9px;color:inherit;opacity:.7">pergunta livre</span></div>
        <div class="type-btn" id="toggle-structured" onclick="setFormType('structured')">Structured<br><span style="font-size:9px;color:inherit;opacity:.7">método / saída / exemplo</span></div>
      </div>

      <div id="form-classic">
        <div class="field"><label>Termo / Pergunta</label><input type="text" id="f-term" placeholder=".reduce(), async/await…" /></div>
        <div class="field"><label>Categoria</label><select id="f-cat"><option>Array</option><option>String</option><option>JavaScript</option><option>Object</option><option>DOM</option><option>Async</option><option>React</option><option>CSS</option><option>Algoritmo</option><option>Geral</option></select></div>
        <div class="field"><label>Explicação / Resposta</label><textarea id="f-def" placeholder="O que faz, em uma frase simples…"></textarea></div>
        <div class="field"><label>Exemplo de código (opcional)</label><textarea id="f-ex" placeholder='arr.join("-") → "a-b-c"' style="font-family:var(--mono);font-size:13px"></textarea></div>
      </div>

      <div id="form-structured" style="display:none">
        <div class="field"><label>Método (ex: .join())</label><input type="text" id="fs-term" placeholder=".join()" /></div>
        <div class="field"><label>Categoria</label><select id="fs-cat"><option>Array</option><option>String</option><option>JavaScript</option><option>Object</option><option>DOM</option><option>Async</option><option>React</option><option>CSS</option><option>Algoritmo</option><option>Geral</option></select></div>
        <div class="field"><label>Resposta — Método</label><input type="text" id="fs-metodo" placeholder="Método de array" /></div>
        <div class="field"><label>Resposta — Saída</label><input type="text" id="fs-saida" placeholder="string (array → string)" /></div>
        <div class="field"><label>Contexto (variável de exemplo)</label><input type="text" id="fs-contexto" placeholder='const arr = ["maçã", "banana"]' style="font-family:var(--mono);font-size:13px" /></div>
        <div class="field"><label>Código correto</label><input type="text" id="fs-codigo" placeholder='arr.join(",")' style="font-family:var(--mono);font-size:13px" /></div>
        <div class="field"><label>Output correto</label><input type="text" id="fs-output" placeholder='"maçã,banana"' style="font-family:var(--mono);font-size:13px" /></div>
      </div>

      <button class="save-btn" onclick="addCard()">Salvar card</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal" style="display:none" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3>Editar card</h3>
    <input type="hidden" id="e-id" />
    <input type="hidden" id="e-type" />

    <div id="edit-classic">
      <div class="field"><label>Termo / Pergunta</label><input type="text" id="e-term" /></div>
      <div class="field"><label>Categoria</label><select id="e-cat"><option>Array</option><option>String</option><option>JavaScript</option><option>Object</option><option>DOM</option><option>Async</option><option>React</option><option>CSS</option><option>Algoritmo</option><option>Geral</option></select></div>
      <div class="field"><label>Explicação / Resposta</label><textarea id="e-def"></textarea></div>
      <div class="field"><label>Exemplo de código</label><textarea id="e-ex" style="font-family:var(--mono);font-size:13px"></textarea></div>
    </div>

    <div id="edit-structured" style="display:none">
      <div class="field"><label>Método</label><input type="text" id="es-term" /></div>
      <div class="field"><label>Categoria</label><select id="es-cat"><option>Array</option><option>String</option><option>JavaScript</option><option>Object</option><option>DOM</option><option>Async</option><option>React</option><option>CSS</option><option>Algoritmo</option><option>Geral</option></select></div>
      <div class="field"><label>Resposta — Método</label><input type="text" id="es-metodo" /></div>
      <div class="field"><label>Resposta — Saída</label><input type="text" id="es-saida" /></div>
      <div class="field"><label>Contexto</label><input type="text" id="es-contexto" style="font-family:var(--mono);font-size:13px" /></div>
      <div class="field"><label>Código correto</label><input type="text" id="es-codigo" style="font-family:var(--mono);font-size:13px" /></div>
      <div class="field"><label>Output correto</label><input type="text" id="es-output" style="font-family:var(--mono);font-size:13px" /></div>
    </div>

    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEdit()">Cancelar</button>
      <button class="modal-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'devflash_v4';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const DEFAULT_CARDS = [
  // ══ STRUCTURED — Array ════════════════════════════════════
  {id:101,type:'structured',cat:'Array',term:'.join()',
   metodo_resp:'Método de array',
   saida_resp:'string — converte array → string',
   contexto:'const arr = ["maçã", "banana", "açaí"]',
   codigo_resp:'arr.join(",")',
   output_resp:'"maçã,banana,açaí"'},

  {id:102,type:'structured',cat:'Array',term:'.push()',
   metodo_resp:'Método de array (mutável — altera o original)',
   saida_resp:'number — novo length do array',
   contexto:'const arr = ["a", "b"]',
   codigo_resp:'arr.push("c")',
   output_resp:'3  →  arr agora é ["a", "b", "c"]'},

  {id:103,type:'structured',cat:'Array',term:'.unshift()',
   metodo_resp:'Método de array (mutável — altera o original)',
   saida_resp:'number — novo length do array',
   contexto:'const arr = ["b", "c"]',
   codigo_resp:'arr.unshift("a")',
   output_resp:'3  →  arr agora é ["a", "b", "c"]'},

// ─────────────────────────────────────────────────────────────
let cards = [], queue = [], wrongList = [], qi = 0, score = {ok:0,nok:0};
let formType = 'classic';

function load() {
  try { cards = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { cards = []; }
  if (!cards.length) { cards = DEFAULT_CARDS; save(); }
  updateBadge(); fillCatSels(); setupStudy(); renderList();
}
function save() { localStorage.setItem(KEY, JSON.stringify(cards)); }
function updateBadge() { document.getElementById('total-badge').textContent = cards.length + ' cards'; }
function cats() { return ['Todas', ...new Set(cards.map(c=>c.cat))]; }

function fillCatSels() {
  ['study-cat-sel','list-cat-sel'].forEach(id => {
    const s = document.getElementById(id); if (!s) return;
    const v = s.value;
    s.innerHTML = cats().map(c=>`<option ${c===v?'selected':''}>${c}</option>`).join('');
  });
}

function go(tab) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',['study','list','add'][i]===tab));
  document.getElementById('screen-'+tab).classList.add('active');
  if (tab==='list') renderList();
}

// ── STUDY ───────────────────────────────────────────────────
function setupStudy() {
  fillCatSels();
  const cat = document.getElementById('study-cat-sel').value;
  const pool = cat==='Todas' ? [...cards] : cards.filter(c=>c.cat===cat);
  queue = shuffle(pool);
  wrongList = []; qi = 0; score = {ok:0,nok:0};
  updateProgress(); renderStudyMain();
}

function updateProgress() {
  const total = queue.length;
  const pct = total ? Math.round(qi/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = qi+'/'+total;
  document.getElementById('deck-count').textContent = total+' cards';
  const wb = document.getElementById('wrong-count');
  if (wrongList.length) { wb.style.display=''; wb.textContent=wrongList.length+' pra repetir'; }
  else wb.style.display='none';
}

function renderStudyMain() {
  const el = document.getElementById('study-main');
  if (!cards.length) { el.innerHTML=`<div class="empty-state">Nenhum card ainda.<br>Vá em <b>+ Adicionar</b>!</div>`; return; }
  if (!queue.length) { setupStudy(); return; }
  if (qi >= queue.length) { renderScore(el); return; }
  const c = queue[qi];
  updateProgress();
  if (c.type==='structured') renderStructuredCard(el,c);
  else renderClassicCard(el,c);
}

// ── CLASSIC CARD ────────────────────────────────────────────
function renderClassicCard(el, c) {
  el.innerHTML = `
    <div class="card-front-box">
      <div class="card-cat">${c.cat}</div>
      <div class="card-term">${esc(c.term)}</div>
      <div class="user-answer-label">Sua resposta</div>
      <textarea class="user-answer-box" id="user-ans" placeholder="Escreva com suas palavras…" onkeydown="if(event.ctrlKey&&event.key==='Enter')reveal()"></textarea>
    </div>
    <div class="card-back-box" id="back-box">
      <div class="back-section-label">Sua resposta</div>
      <div class="back-user-answer" id="back-user-ans"></div>
      <div class="divider"></div>
      <div class="back-section-label">Resposta correta</div>
      <div class="back-term">${esc(c.term)}</div>
      <div class="back-def">${esc(c.def)}</div>
      ${c.ex?`<div class="back-example">${esc(c.ex)}</div>`:''}
    </div>
    ${actionsHTML()}`;
  document.getElementById('user-ans').focus();
}

// ── STRUCTURED CARD ─────────────────────────────────────────
function renderStructuredCard(el, c) {
  el.innerHTML = `
    <div class="card-front-box structured">
      <div class="struct-header">
        <div class="card-cat">${c.cat}</div>
        <div class="struct-title">${esc(c.term)}</div>
      </div>
      <div class="struct-fields">
        <div class="struct-field">
          <div class="struct-label"><span class="struct-label-num">1</span> Método</div>
          <input type="text" class="struct-input" id="s-metodo" placeholder="tipo / categoria do método…" autocomplete="off" />
        </div>
        <div class="struct-field">
          <div class="struct-label"><span class="struct-label-num">2</span> Saída</div>
          <input type="text" class="struct-input" id="s-saida" placeholder="o que retorna / tipo de dado…" autocomplete="off" />
        </div>
        <div class="struct-field">
          <div class="struct-label"><span class="struct-label-num">3</span> O que faz aqui?</div>
          <div class="struct-context">${esc(c.contexto)}</div>
          <input type="text" class="struct-input" id="s-exemplo" placeholder="código → output" autocomplete="off" onkeydown="if(event.key==='Enter')reveal()" />
        </div>
      </div>
    </div>

    <div class="struct-back-box" id="back-box">
      <div class="struct-back-row">
        <div class="struct-back-label"><span class="struct-label-num">1</span> Método</div>
        <div class="struct-back-user" id="back-metodo"></div>
        <div class="struct-back-correct">${esc(c.metodo_resp)}</div>
      </div>
      <div class="struct-back-row">
        <div class="struct-back-label"><span class="struct-label-num">2</span> Saída</div>
        <div class="struct-back-user" id="back-saida"></div>
        <div class="struct-back-correct">${esc(c.saida_resp)}</div>
      </div>
      <div class="struct-back-row">
        <div class="struct-back-label"><span class="struct-label-num">3</span> O que faz aqui?</div>
        <div class="struct-context-back">${esc(c.contexto)}</div>
        <div class="struct-back-user" id="back-exemplo"></div>
        <div class="struct-back-correct-code">
          <span class="struct-code">${esc(c.codigo_resp)}</span>
          <span class="struct-arrow">→</span>
          <span class="struct-output">${esc(c.output_resp)}</span>
        </div>
      </div>
    </div>

    ${actionsHTML()}`;
  document.getElementById('s-metodo').focus();
}

function actionsHTML() {
  return `<div id="study-actions">
    <div class="row-between">
      <button class="btn-reveal" id="btn-rev" onclick="reveal()" style="flex:1">Revelar resposta</button>
      <button class="btn-skip" onclick="skip()" style="margin-left:8px">Pular →</button>
    </div>
    <div id="eval-btns" style="display:none;margin-top:10px">
      <div class="answer-btns">
        <button class="btn-wrong" onclick="answer(false)">✗ &nbsp;Errei — repetir depois</button>
        <button class="btn-right" onclick="answer(true)">✓ &nbsp;Acertei</button>
      </div>
    </div>
  </div>`;
}

function reveal() {
  const c = queue[qi];
  if (c.type==='structured') {
    const m=document.getElementById('s-metodo'), s=document.getElementById('s-saida'), e=document.getElementById('s-exemplo');
    document.getElementById('back-metodo').textContent  = m?.value.trim()||'(sem resposta)';
    document.getElementById('back-saida').textContent   = s?.value.trim()||'(sem resposta)';
    document.getElementById('back-exemplo').textContent = e?.value.trim()||'(sem resposta)';
  } else {
    const ua = document.getElementById('user-ans');
    document.getElementById('back-user-ans').textContent = ua?.value.trim()||'(sem resposta)';
  }
  document.getElementById('back-box').classList.add('visible');
  document.getElementById('btn-rev').style.display = 'none';
  document.getElementById('eval-btns').style.display = 'block';
  document.getElementById('back-box').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function answer(ok) {
  if (ok) score.ok++; else { score.nok++; wrongList.push({...queue[qi]}); }
  qi++;
  if (qi>=queue.length && wrongList.length) { queue=queue.concat(shuffle(wrongList)); wrongList=[]; }
  renderStudyMain();
}

function skip() { const c=queue.splice(qi,1)[0]; queue.push(c); renderStudyMain(); }

function renderScore(el) {
  const total = score.ok+score.nok;
  const pct   = total ? Math.round(score.ok/total*100) : 100;
  document.getElementById('prog-fill').style.width='100%';
  el.innerHTML=`<div class="score-card">
    <div class="score-big">${pct}%</div>
    <div class="score-label">de acerto — ${total} respostas no total</div>
    <div class="score-row">
      <div class="score-stat g"><div class="n">${score.ok}</div><div class="l">acertos</div></div>
      <div class="score-stat r"><div class="n">${score.nok}</div><div class="l">erros</div></div>
    </div>
    <button class="btn-primary" onclick="setupStudy()">Estudar novamente</button>
  </div>`;
}

// ── LIST ────────────────────────────────────────────────────
function renderList() {
  const cat = document.getElementById('list-cat-sel')?.value||'Todas';
  const filtered = cat==='Todas' ? cards : cards.filter(c=>c.cat===cat);
  document.getElementById('list-count').textContent = filtered.length+' cards';
  const el = document.getElementById('card-list');
  if (!filtered.length) { el.innerHTML=`<div class="empty-state">Nenhum card aqui.</div>`; return; }
  el.innerHTML = filtered.map(c=>{
    const preview = c.type==='structured'
      ? `${c.metodo_resp} · ${c.saida_resp}`
      : (c.def||'');
    return `<div class="card-row">
      <span class="cr-type">${c.type==='structured'?'struct':'recall'}</span>
      <span class="cr-term">${esc(c.term)}</span>
      <span class="cr-def">${esc(preview)}</span>
      <span class="cr-cat">${c.cat}</span>
      <button class="cr-edit" onclick="editCard(${c.id})" title="Editar">✎</button>
      <button class="cr-del" onclick="del(${c.id})" title="Excluir">×</button>
    </div>`;
  }).join('');
}

function del(id) {
  if (!confirm('Excluir este card?')) return;
  cards=cards.filter(c=>c.id!==id);
  save(); updateBadge(); fillCatSels(); renderList();
  queue=queue.filter(c=>c.id!==id); wrongList=wrongList.filter(c=>c.id!==id);
  if (qi>=queue.length) qi=Math.max(0,queue.length-1);
}

// ── ADD ─────────────────────────────────────────────────────
function setFormType(type) {
  formType = type;
  document.getElementById('form-classic').style.display    = type==='classic'?'':'none';
  document.getElementById('form-structured').style.display = type==='structured'?'':'none';
  document.getElementById('toggle-classic').classList.toggle('active',type==='classic');
  document.getElementById('toggle-structured').classList.toggle('active',type==='structured');
}

function addCard() {
  let card;
  if (formType==='structured') {
    const term=document.getElementById('fs-term').value.trim();
    const cat=document.getElementById('fs-cat').value;
    const metodo_resp=document.getElementById('fs-metodo').value.trim();
    const saida_resp=document.getElementById('fs-saida').value.trim();
    const contexto=document.getElementById('fs-contexto').value.trim();
    const codigo_resp=document.getElementById('fs-codigo').value.trim();
    const output_resp=document.getElementById('fs-output').value.trim();
    if (!term||!metodo_resp||!saida_resp) { alert('Preencha ao menos Método, Resposta-Método e Resposta-Saída!'); return; }
    card={id:Date.now(),type:'structured',cat,term,metodo_resp,saida_resp,contexto,codigo_resp,output_resp};
    ['fs-term','fs-metodo','fs-saida','fs-contexto','fs-codigo','fs-output'].forEach(id=>document.getElementById(id).value='');
  } else {
    const term=document.getElementById('f-term').value.trim();
    const cat=document.getElementById('f-cat').value;
    const def=document.getElementById('f-def').value.trim();
    const ex=document.getElementById('f-ex').value.trim();
    if (!term||!def) { alert('Preencha o termo e a explicação!'); return; }
    card={id:Date.now(),type:'classic',cat,term,def,ex};
    ['f-term','f-def','f-ex'].forEach(id=>document.getElementById(id).value='');
  }
  cards.push(card);
  save(); updateBadge(); fillCatSels();
  toast('Card salvo!');
  go('study'); setupStudy();
}

// ── EDIT ────────────────────────────────────────────────────
function editCard(id) {
  const c=cards.find(c=>c.id===id); if (!c) return;
  document.getElementById('e-id').value=id;
  document.getElementById('e-type').value=c.type||'classic';
  if (c.type==='structured') {
    document.getElementById('edit-classic').style.display='none';
    document.getElementById('edit-structured').style.display='';
    document.getElementById('es-term').value=c.term;
    document.getElementById('es-cat').value=c.cat;
    document.getElementById('es-metodo').value=c.metodo_resp||'';
    document.getElementById('es-saida').value=c.saida_resp||'';
    document.getElementById('es-contexto').value=c.contexto||'';
    document.getElementById('es-codigo').value=c.codigo_resp||'';
    document.getElementById('es-output').value=c.output_resp||'';
  } else {
    document.getElementById('edit-classic').style.display='';
    document.getElementById('edit-structured').style.display='none';
    document.getElementById('e-term').value=c.term;
    document.getElementById('e-cat').value=c.cat;
    document.getElementById('e-def').value=c.def;
    document.getElementById('e-ex').value=c.ex||'';
  }
  document.getElementById('edit-modal').style.display='flex';
}

function closeEdit() { document.getElementById('edit-modal').style.display='none'; }

function saveEdit() {
  const id=parseInt(document.getElementById('e-id').value);
  const type=document.getElementById('e-type').value;
  const idx=cards.findIndex(c=>c.id===id); if (idx===-1) return;
  let updated;
  if (type==='structured') {
    const term=document.getElementById('es-term').value.trim();
    const cat=document.getElementById('es-cat').value;
    const metodo_resp=document.getElementById('es-metodo').value.trim();
    const saida_resp=document.getElementById('es-saida').value.trim();
    const contexto=document.getElementById('es-contexto').value.trim();
    const codigo_resp=document.getElementById('es-codigo').value.trim();
    const output_resp=document.getElementById('es-output').value.trim();
    if (!term||!metodo_resp||!saida_resp) { alert('Preencha os campos obrigatórios!'); return; }
    updated={id,type,cat,term,metodo_resp,saida_resp,contexto,codigo_resp,output_resp};
  } else {
    const term=document.getElementById('e-term').value.trim();
    const cat=document.getElementById('e-cat').value;
    const def=document.getElementById('e-def').value.trim();
    const ex=document.getElementById('e-ex').value.trim();
    if (!term||!def) { alert('Preencha o termo e a explicação!'); return; }
    updated={id,type,cat,term,def,ex};
  }
  cards[idx]=updated;
  save(); updateBadge(); fillCatSels(); renderList();
  closeEdit(); toast('Card atualizado!');
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

load();
</script>
</body>
</html>
